services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: aml-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: aml-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: aml-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  minio:
    image: minio/minio:latest
    container_name: aml-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: aml-mlflow
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlartifacts
    volumes:
      - mlflow_data:/mlartifacts

  redis:
    image: redis:7-alpine
    container_name: aml-redis
    ports:
      - "6379:6379"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aml-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    environment:
      - REACT_APP_SCORING_API_URL=http://localhost:8000
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true

  scoring-api:
    build:
      context: .
      dockerfile: ml/api/Dockerfile
    container_name: aml-scoring-api
    ports:
      - "8000:8000"
    volumes:
      - ./ml:/app/ml
      - ./feature_engineering:/app/feature_engineering
    environment:
      - MODEL_PATH=ml/models/xgboost_v1.pkl
      - RISK_THRESHOLD=0.5
      - PYTHONPATH=/app

volumes:
  minio_data:
  mlflow_data:
